version: '3.8'

services:
  kredit-app:
    build: .
    ports:
      - "5111:5000"
    volumes:
      - /volume1/docker/kreditbefogadas/data:/app/data
      - /volume1/docker/kreditbefogadas/uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/filters', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
