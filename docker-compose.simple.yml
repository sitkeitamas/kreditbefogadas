version: '3.8'

services:
  kredit-app:
    image: node:18-alpine
    container_name: kreditbefogadas-kredit-app-1
    working_dir: /app
    command: ["node", "server-working.js"]
    ports:
      - "5111:5000"
    volumes:
      - /volume1/docker/kreditbefogadas/data:/app/data:ro
      - /volume1/docker/kreditbefogadas/server-working.js:/app/server-working.js:ro
    environment:
      NODE_ENV: production
      PORT: 5000
    restart: unless-stopped
